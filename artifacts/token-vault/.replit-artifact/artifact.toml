kind = "web"
previewPath = "/"
title = "Token Vault"
version = "1.0.0"
id = "artifacts/token-vault"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18506

[services.development]
run = "pnpm --filter @workspace/token-vault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/token-vault", "run", "build" ]
publicDir = "artifacts/token-vault/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18506"
BASE_PATH = "/"
